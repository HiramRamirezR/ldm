<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#58cc02">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2358cc02'/%3E%3Ctext x='16' y='24' font-size='20' text-anchor='middle' fill='white'%3E📖%3C/text%3E%3C/svg%3E">
  <title>LdM Diario</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Splash -->
    <div id="screen-splash" class="screen active">
      <div class="splash-content">
        <div class="logo-icon">📖</div>
        <h1>LdM Diario</h1>
        <p class="splash-subtitle">Creando el hábito de la lectura diaria</p>
        <div class="loader"></div>
      </div>
    </div>

    <!-- Home -->
    <div id="screen-home" class="screen">
      <header class="top-bar">
        <div class="logo-small">📖 LdM</div>
        <div class="streak-badge" id="streakBadge">
          <span class="streak-fire">🔥</span>
          <span class="streak-count" id="streakCount">0</span>
        </div>
      </header>

      <div class="home-content">
        <div class="greeting" id="greeting">¡Buenos días! ☀️</div>

        <div class="streak-card">
          <div class="streak-card-main">
            <span class="big-fire">🔥</span>
            <div>
              <span class="big-number" id="streakNumber">0</span>
              <span class="streak-label">días de racha</span>
            </div>
          </div>
          <div class="week-bar" id="weekBar"></div>
        </div>

        <div class="progress-card">
          <div class="progress-header">
            <span>Progreso total</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
          <div class="progress-detail" id="progressDetail">0 / 239 capítulos</div>
        </div>

        <button class="btn-primary btn-large" id="btnRead">
          <span id="btnReadText">Empezar Lectura de Hoy</span>
        </button>

        <div class="current-book">
          <span class="label">Leyendo ahora:</span>
          <span class="value" id="currentChapterLabel">1 Nefi 1</span>
        </div>
      </div>
    </div>

    <!-- Reading -->
    <div id="screen-reading" class="screen">
      <header class="top-bar">
        <button class="btn-icon" id="btnBackReading">←</button>
        <span class="chapter-title" id="chapterTitle">1 Nefi 1</span>
        <div class="spacer"></div>
      </header>

      <div class="reading-content" id="readingContent">
        <div class="chapter-summary" id="chapterSummary"></div>
        <div class="verses" id="verses"></div>
      </div>

      <div class="reading-footer">
        <div class="reading-progress-bar">
          <div class="reading-progress-fill" id="readingProgress" style="width: 0%"></div>
        </div>
        <button class="btn-primary" id="btnFinishReading">
          Leí el capítulo ✓
        </button>
      </div>
    </div>

    <!-- Quiz -->
    <div id="screen-quiz" class="screen">
      <header class="top-bar">
        <button class="btn-icon" id="btnBackQuiz">←</button>
        <span class="quiz-counter" id="quizCounter">1 / 3</span>
        <div class="quiz-progress-track">
          <div class="quiz-progress-fill" id="quizProgress" style="width: 33%"></div>
        </div>
      </header>

      <div class="quiz-content" id="quizContent">
        <div class="quiz-question" id="quizQuestion"></div>
        <div class="quiz-options" id="quizOptions"></div>
      </div>

      <div class="quiz-feedback" id="quizFeedback" hidden>
        <div class="feedback-icon" id="feedbackIcon">✅</div>
        <div class="feedback-text" id="feedbackText">¡Correcto!</div>
      </div>

      <div class="quiz-footer">
        <button class="btn-primary" id="btnNextQuestion" hidden>Siguiente</button>
      </div>
    </div>

    <!-- Results -->
    <div id="screen-results" class="screen">
      <div class="results-content">
        <div class="results-icon" id="resultsIcon">🎉</div>
        <h2 class="results-title" id="resultsTitle">¡Capítulo Completado!</h2>
        <div class="results-score">
          <span class="score-value" id="scoreValue">3/3</span>
          <span class="score-label">respuestas correctas</span>
        </div>
        <div class="results-streak">
          🔥 Racha de <strong id="newStreak">0</strong> días
        </div>
        <button class="btn-primary btn-large" id="btnContinue">Seguir Leyendo →</button>
        <button class="btn-secondary" id="btnHome">Volver al Inicio</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
