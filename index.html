<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1b3e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <!-- Social / Open Graph -->
  <meta property="og:title" content="LdM Diario">
  <meta property="og:description" content="Crea el hábito de leer el Libro de Mormón cada día. Racha, reflexiones y más.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icon.svg">
  <meta property="og:url" content="">  <!-- Update with deployment URL -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="LdM Diario">
  <meta name="twitter:description" content="Crea el hábito de leer el Libro de Mormón cada día.">

  <link rel="manifest" href="manifest.json?v=3">
  <link rel="icon" href="icon.svg">
  <title>LdM Diario</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
  <div id="app">
    <!-- Splash -->
    <div id="screen-splash" class="screen active">
      <div class="splash-content">
        <div class="logo-icon"><i class="fa-solid fa-book-open"></i></div>
        <h1>LdM Diario</h1>
        <p class="splash-subtitle">Creando el hábito de la lectura diaria</p>
        <div class="loader"></div>
      </div>
    </div>

    <!-- Home -->
    <div id="screen-home" class="screen">
      <header class="top-bar">
        <div class="logo-small"><i class="fa-solid fa-book-open"></i> LdM</div>
        <button class="btn-darkmode" id="btnDarkMode" title="Modo oscuro"><i class="fa-regular fa-moon"></i></button>
        <div class="streak-badge" id="streakBadge">
          <i class="fa-solid fa-fire"></i>
          <span class="streak-count" id="streakCount">0</span>
        </div>
      </header>

      <div class="home-content">

        <div class="streak-card">
          <div class="streak-card-main">
            <span class="big-fire"><i class="fa-solid fa-fire"></i></span>
            <div>
              <span class="big-number" id="streakNumber">0</span>
              <span class="streak-label">d&iacute;as de racha</span>
            </div>
          </div>
          <div class="week-bar" id="weekBar"></div>
        </div>

        <div id="bookmarkAlert" class="bookmark-alert" style="display:none">
          <span class="alert-text"><i class="fa-solid fa-bookmark"></i> Lectura pendiente</span>
          <span class="alert-arrow"><i class="fa-solid fa-arrow-right"></i></span>
        </div>

        <div class="progress-card">
          <div class="progress-header">
            <span>Progreso total</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
          </div>
          <div class="progress-detail" id="progressDetail">0 / 239 cap&iacute;tulos</div>
        </div>

        <button class="btn-primary btn-large" id="btnRead">
          <span id="btnReadText"><i class="fa-regular fa-circle-play"></i> Empezar Lectura de Hoy</span>
        </button>

        <div class="current-book" id="currentBook">
          <span class="label">Leyendo ahora:</span>
          <span class="value" id="currentChapterLabel">1 Nefi 1</span>
          <span class="change-badge"><i class="fa-solid fa-arrow-right"></i> Cambiar</span>
        </div>

        <div class="home-actions">
          <button class="btn-secondary" id="btnJournal"><i class="fa-solid fa-book"></i> Mi Diario</button>
          <button class="btn-install" id="btnInstall" style="display:none"><i class="fa-solid fa-download"></i> Instalar App</button>
        </div>
      </div>
    </div>

    <!-- Modal selector -->
    <div id="modalOverlay" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Seleccionar Cap&iacute;tulo</h2>
          <button class="modal-close" id="modalClose"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <!-- Reading -->
    <div id="screen-reading" class="screen">
      <header class="top-bar">
        <button class="btn-icon" id="btnBackReading"><i class="fa-solid fa-arrow-left"></i></button>
        <span class="chapter-title" id="chapterTitle">1 Nefi 1</span>
        <button class="btn-darkmode" id="btnDarkModeReading" title="Modo oscuro"><i class="fa-regular fa-moon"></i></button>
        <div class="font-size-controls">
          <button class="btn-font" id="btnFontDown">A-</button>
          <button class="btn-font" id="btnFontUp">A+</button>
        </div>
      </header>

      <div class="swipe-hint" id="swipeHint"><span><i class="fa-solid fa-arrow-left"></i> Ant.</span><span>Sig. <i class="fa-solid fa-arrow-right"></i></span></div>
      <div class="reading-content" id="readingContent">
        <div class="chapter-summary" id="chapterSummary"></div>
        <div class="verses" id="verses"></div>
      </div>

      <div class="reading-footer">
        <div class="reading-progress-bar">
          <div class="reading-progress-fill" id="readingProgress" style="width: 0%"></div>
        </div>
        <div class="reading-footer-row">
          <button class="btn-bookmark" id="bookmarkBtn"><i class="fa-solid fa-bookmark"></i> <span id="bookmarkLabel">Marcar</span></button>
          <button class="btn-bookmark" id="btnShareReading" style="border-color:var(--gray-light);color:var(--text-light)"><i class="fa-solid fa-share-nodes"></i></button>
          <button class="btn-primary" id="btnFinishReading"><i class="fa-solid fa-check"></i> Le&iacute; el cap&iacute;tulo</button>
        </div>
      </div>
    </div>

    <!-- Reflection -->
    <div id="screen-reflection" class="screen">
      <header class="top-bar">
        <span class="chapter-title" id="reflectionChapter">1 Nefi 1</span>
        <div class="spacer"></div>
      </header>

      <div class="reflection-content">
        <div class="reflection-header">
          <h2><i class="fa-regular fa-pen-to-square"></i> Reflexi&oacute;n</h2>
          <p id="reflectionTitle">1 Nefi 1</p>
        </div>
        <div id="reflectionCards"></div>
      </div>

      <div class="reflection-footer">
        <button class="btn-primary btn-large" id="btnFinishReflection"><i class="fa-solid fa-arrow-right"></i> Continuar</button>
      </div>
    </div>

    <!-- Results -->
    <div id="screen-results" class="screen">
      <div class="results-content">
        <div class="results-icon"><i class="fa-solid fa-trophy"></i></div>
        <h2 class="results-title" id="resultsTitle">Cap&iacute;tulo Completado</h2>
        <p class="results-subtitle" id="resultsSubtitle"></p>
        <div class="results-streak">
          <i class="fa-solid fa-fire"></i> Racha de <strong id="newStreak">0</strong> d&iacute;as
        </div>
        <button class="btn-primary btn-large" id="btnContinue"><i class="fa-solid fa-arrow-right"></i> Siguiente: 1 Nefi 2</button>
        <button class="btn-secondary" id="btnShare"><i class="fa-solid fa-share-nodes"></i> Compartir</button>
        <button class="btn-secondary" id="btnHome"><i class="fa-solid fa-house"></i> Volver al Inicio</button>
      </div>
    </div>

    <!-- Journal -->
    <div id="screen-journal" class="screen">
      <header class="top-bar">
        <button class="btn-icon" id="btnJournalBack"><i class="fa-solid fa-arrow-left"></i></button>
        <span><i class="fa-solid fa-book"></i> Mi Diario</span>
        <div class="spacer"></div>
      </header>
      <div class="reflection-content" id="journalList"></div>
    </div>
    <div id="toast"></div>
  </div>

  <script src="js/storage.js?v=3"></script>
  <script src="js/api.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
